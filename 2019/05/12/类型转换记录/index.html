    <div class="post-content ">
        <p>###字典转类对象，类转字典方法</p>
<p>类转字典<br><figure class="highlight ruby"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br></pre></td><td class="code"><pre><span class="line"><span class="class"><span class="keyword">class</span> <span class="title">ToDict</span>:</span></span><br><span class="line">    <span class="function"><span class="keyword">def</span> <span class="title">__init__</span><span class="params">(<span class="keyword">self</span>)</span></span><span class="symbol">:</span></span><br><span class="line">        <span class="keyword">self</span>.a = <span class="number">1</span></span><br><span class="line">        <span class="keyword">self</span>.b = &#123;<span class="string">"s"</span><span class="symbol">:</span><span class="number">1</span>,<span class="string">"aa"</span><span class="symbol">:</span>[&#123;<span class="string">"b"</span><span class="symbol">:</span><span class="number">66</span>&#125;]&#125;</span><br><span class="line">        <span class="keyword">self</span>.c = <span class="string">'Green'</span></span><br><span class="line"></span><br><span class="line">todict = ToDict().__dict_<span class="number">_</span></span><br></pre></td></tr></table></figure></p>
<p>字典转类<br><figure class="highlight ruby"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br></pre></td><td class="code"><pre><span class="line"><span class="class"><span class="keyword">class</span> <span class="title">ToClass</span>:</span></span><br><span class="line">    <span class="function"><span class="keyword">def</span> <span class="title">__init__</span><span class="params">(<span class="keyword">self</span>, **entries)</span></span><span class="symbol">:</span></span><br><span class="line">        <span class="keyword">self</span>.__dict_<span class="number">_</span>.update(entries)</span><br><span class="line">        </span><br><span class="line">toclass = ToClass(**kwargs)</span><br></pre></td></tr></table></figure></p>
<p>####其他可能用到转换<br><figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br></pre></td><td class="code"><pre><span class="line">1、字典</span><br><span class="line">dict = &#123;<span class="string">'name'</span>: <span class="string">'Zara'</span>, <span class="string">'age'</span>: 7, <span class="string">'class'</span>: <span class="string">'First'</span>&#125;</span><br><span class="line">字典转为字符串，返回：&lt;<span class="built_in">type</span> <span class="string">'str'</span>&gt; &#123;<span class="string">'age'</span>: 7, <span class="string">'name'</span>: <span class="string">'Zara'</span>, <span class="string">'class'</span>: <span class="string">'First'</span>&#125;</span><br><span class="line"><span class="built_in">print</span> <span class="built_in">type</span>(str(dict)), str(dict)</span><br><span class="line">字典可以转为元组，返回：(<span class="string">'age'</span>, <span class="string">'name'</span>, <span class="string">'class'</span>)</span><br><span class="line"><span class="built_in">print</span> tuple(dict)</span><br><span class="line">字典可以转为元组，返回：(7, <span class="string">'Zara'</span>, <span class="string">'First'</span>)</span><br><span class="line"><span class="built_in">print</span> tuple(dict.values())</span><br><span class="line">字典转为列表，返回：[<span class="string">'age'</span>, <span class="string">'name'</span>, <span class="string">'class'</span>]</span><br><span class="line"><span class="built_in">print</span> list(dict)</span><br><span class="line">字典转为列表</span><br><span class="line"><span class="built_in">print</span> dict.values</span><br><span class="line"></span><br><span class="line">2、元组</span><br><span class="line">tup=(1, 2, 3, 4, 5)</span><br><span class="line">元组转为字符串，返回：(1, 2, 3, 4, 5)</span><br><span class="line"><span class="built_in">print</span> tup.__str__()</span><br><span class="line">元组转为列表，返回：[1, 2, 3, 4, 5]</span><br><span class="line"><span class="built_in">print</span> list(tup)</span><br><span class="line">元组不可以转为字典</span><br><span class="line">3、列表</span><br><span class="line">nums=[1, 3, 5, 7, 8, 13, 20];</span><br><span class="line">列表转为字符串，返回：[1, 3, 5, 7, 8, 13, 20]</span><br><span class="line"><span class="built_in">print</span> str(nums)</span><br><span class="line">列表转为元组，返回：(1, 3, 5, 7, 8, 13, 20)</span><br><span class="line"><span class="built_in">print</span> tuple(nums)</span><br><span class="line">列表不可以转为字典</span><br><span class="line">4、字符串</span><br><span class="line">字符串转为元组，返回：(1, 2, 3)</span><br><span class="line"><span class="built_in">print</span> tuple(<span class="built_in">eval</span>(<span class="string">"(1,2,3)"</span>))</span><br><span class="line">字符串转为列表，返回：[1, 2, 3]</span><br><span class="line"><span class="built_in">print</span> list(<span class="built_in">eval</span>(<span class="string">"(1,2,3)"</span>))</span><br><span class="line">字符串转为字典，返回：&lt;<span class="built_in">type</span> <span class="string">'dict'</span>&gt;</span><br><span class="line"><span class="built_in">print</span> <span class="built_in">type</span>(<span class="built_in">eval</span>(<span class="string">"&#123;'name':'ljq', 'age':24&#125;"</span>))</span><br></pre></td></tr></table></figure></p>
